<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANNES AVIATION | Review Hub</title>
    <style>
        :root {
            --navy: #050a14;
            --navy-luxe: #0d1726;
            --gold: #c5a059;
            --gold-light: #e6c280;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--navy);
            color: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.8rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 5px;
            font-weight: 300;
        }

        .header p {
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .card {
            background: var(--navy-luxe);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(197, 160, 89, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: left;
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            padding: 14px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        input:focus { border-color: var(--gold); }

        .btn-main {
            width: 100%;
            padding: 16px;
            background: var(--gold);
            color: var(--navy);
            border: none;
            border-radius: 10px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .btn-main:hover { background: var(--gold-light); transform: translateY(-2px); }

        /* --- APERÇU GOOGLE --- */
        #google-box {
            display: none;
            margin-top: 25px;
            background: white;
            border-radius: 15px;
            padding: 20px;
            color: #202124;
            animation: slideUp 0.4s ease-out;
        }

        .google-user { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #1a73e8; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .stars { color: #fbbc05; font-size: 1.2rem; margin-bottom: 8px; }
        .review-text { font-size: 0.95rem; line-height: 1.5; color: #3c4043; font-style: italic; }

        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn-action { padding: 12px; border-radius: 8px; border: 1px solid #dadce0; cursor: pointer; font-weight: 600; font-size: 0.8rem; }
        .btn-google { background: #1a73e8; color: white; border: none; }

        .footer-links { margin-top: 30px; display: flex; justify-content: center; gap: 20px; }
        .footer-links a { color: var(--gold); text-decoration: none; font-size: 0.75rem; font-weight: 600; opacity: 0.6; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Cannes Aviation</h1>
        <p>Academy Elite</p>
    </div>

    <div class="card">
        <div class="form-group">
            <label>Votre Nom</label>
            <input type="text" id="nom" placeholder="Ex: Marc Lefebvre">
        </div>

        <div class="form-group">
            <label>Cursus / Formation</label>
            <select id="formation">
                <option value="ATP Intégré">ATP Intégré</option>
                <option value="ATP Modulaire">ATP Modulaire</option>
                <option value="ATPL Théorique">ATPL Théorique</option>
                <option value="Formation PPL">Formation PPL</option>
                <option value="CPL / IR / ME">CPL / IR / ME</option>
                <option value="Vol d'initiation">Vol d'initiation</option>
            </select>
        </div>

        <div class="form-group">
            <label>Votre Note</label>
            <select id="note">
                <option value="5">Excellent ⭐⭐⭐⭐⭐</option>
                <option value="4">Très Bien ⭐⭐⭐⭐</option>
                <option value="3">Moyen ⭐⭐⭐</option>
                <option value="2">Décevant ⭐⭐</option>
                <option value="1">Mauvais ⭐</option>
            </select>
        </div>

        <button class="btn-main" onclick="genererAvis()">⚡ Générer mon avis</button>

        <div id="google-box">
            <div class="google-user">
                <div class="avatar" id="avatarLetter">?</div>
                <div>
                    <div style="font-weight: bold; font-size: 0.9rem;" id="resNom">Nom</div>
                    <div style="font-size: 0.7rem; color: #70757a;">Avis Google • À l'instant</div>
                </div>
            </div>
            <div class="stars" id="resStars">★★★★★</div>
            <div class="review-text" id="resText">...</div>
            
            <div class="actions">
                <button class="btn-action" onclick="copier()">📋 Copier</button>
                <button class="btn-action btn-google" onclick="publier()">🌍 Publier sur Google</button>
            </div>
        </div>
    </div>

    <div class="footer-links">
        <a href="https://www.instagram.com/cannesaviation_academy/" target="_blank">Instagram</a>
        <a href="https://www.cannes-aviation.com" target="_blank">Site Officiel</a>
    </div>
</div>

<script>
    const database = {
        5: ["Formation d'excellence ! Les instructeurs de Cannes Aviation sont d'un professionnalisme rare. La flotte Diamond est impeccable.", "Une académie incroyable pour mon cursus ATP. Tout est fait pour réussir son avenir dans l'aérien.", "Expérience de vol parfaite sur la Côte d'Azur. Infrastructures et avions au top niveau."],
        4: ["Très bonne école de pilotage. Formation sérieuse et encadrement de qualité. Je recommande.", "Cursus solide et avions très bien entretenus. Une excellente étape pour ma carrière.", "Équipe à l'écoute et pédagogie efficace. Très satisfait de mon passage ici."],
        3: ["Bilan correct. La formation est de qualité malgré un emploi du temps parfois très dense.", "Satisfait globalement, même si l'organisation pourrait être un peu plus fluide."],
        2: ["Déçu par certains aspects du planning. La formation reste correcte mais manque de suivi.", "Communication difficile durant mon cursus. Dommage car le cadre est superbe."],
        1: ["Expérience décevante. Trop de difficultés pour planifier mes vols. Je ne recommande pas.", "Manque de professionnalisme dans l'accompagnement administratif. Très déçu."]
    };

    function genererAvis() {
        const nom = document.getElementById('nom').value;
        const formation = document.getElementById('formation').value;
        const note = document.getElementById('note').value;

        if(!nom) { alert("Merci de saisir votre nom."); return; }

        const options = database[note];
        const randomText = options[Math.floor(Math.random() * options.length)];
        const texteFinal = `${randomText} (Formation ${formation} effectuée chez Cannes Aviation)`;

        document.getElementById('resNom').innerText = nom;
        document.getElementById('avatarLetter').innerText = nom.charAt(0).toUpperCase();
        document.getElementById('resStars').innerText = "★".repeat(note) + "☆".repeat(5-note);
        document.getElementById('resText').innerText = texteFinal;
        
        document.getElementById('google-box').style.display = 'block';
    }

    function copier() {
        const text = document.getElementById('resText').innerText;
        navigator.clipboard.writeText(text);
        alert("Avis copié ! Vous pouvez maintenant le coller sur Google.");
    }

    function publier() {
        // Lien universel vers la fiche Google Maps de Cannes Aviation
        // Utilise l'ID de recherche Google pour éviter les erreurs 404
        const googleUrl = "https://www.google.com/maps/search/?api=1&query=Cannes+Aviation+Academy&query_place_id=ChIJid05G5_FzRIRpNoH9v3D7H0";
        window.open(googleUrl, '_blank');
    }
</script>

</body>
</html>
