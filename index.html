<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANNES AVIATION - Luxury Review System</title>
    <style>
        /* --- PALETTE DE COULEURS LUXE --- */
        :root {
            --navy-deep: #050a14;
            --navy-card: #0c1626;
            --gold-light: #e6c280;
            --gold-dark: #b38b45;
            --white-glass: rgba(255, 255, 255, 0.9);
            --google-bg: #ffffff;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background-color: var(--navy-deep);
            background-image: radial-gradient(circle at center, #0f1c30 0%, #050a14 100%);
            font-family: 'Optima', 'Didot', 'Playfair Display', serif; /* Polices typées luxe */
            color: var(--gold-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* --- HEADER --- */
        .brand-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .brand-header h1 {
            font-size: 2.5rem;
            letter-spacing: 8px;
            margin: 0;
            text-transform: uppercase;
            background: linear-gradient(to bottom, var(--gold-light), var(--gold-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 300;
        }

        .brand-header p {
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 10px;
            opacity: 0.8;
        }

        /* --- CARTE PRINCIPALE --- */
        .main-card {
            background: var(--navy-card);
            width: 100%;
            max-width: 600px;
            padding: 40px;
            border-radius: 4px;
            border: 1px solid rgba(179, 139, 69, 0.3);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .form-row {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            color: var(--gold-dark);
        }

        input, select {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(179, 139, 69, 0.2);
            padding: 15px;
            color: white;
            font-size: 1rem;
            border-radius: 0;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--gold-light); background: rgba(255,255,255,0.07); }

        .btn-generate {
            width: 100%;
            background: linear-gradient(45deg, var(--gold-dark), var(--gold-light));
            color: var(--navy-deep);
            border: none;
            padding: 18px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.4s;
        }

        .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(179, 139, 69, 0.3); }

        /* --- PREVIEW GOOGLE --- */
        #google-preview {
            display: none;
            margin-top: 40px;
            background: var(--google-bg);
            color: #3c4043;
            width: 100%;
            max-width: 600px;
            padding: 25px;
            border-radius: 8px;
            animation: slideUp 0.6s ease;
        }

        .google-user { display: flex; gap: 15px; align-items: center; margin-bottom: 15px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: #5f6368; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .stars { color: #fbbc05; font-size: 1.3rem; margin: 10px 0; }
        .review-content { font-family: 'Arial', sans-serif; line-height: 1.5; font-size: 0.95rem; }

        /* --- FOOTER LINKS --- */
        .links-bar {
            margin-top: 40px;
            display: flex;
            gap: 30px;
        }

        .link-item {
            color: var(--gold-light);
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0.7;
            transition: 0.3s;
        }

        .link-item:hover { opacity: 1; color: white; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="brand-header">
    <h1>Cannes Aviation</h1>
    <p>The Art of Flight Training</p>
</div>

<div class="main-card">
    <div class="form-row">
        <label>Identité du Pilote</label>
        <input type="text" id="nom" placeholder="Ex: Jean-Luc Picard">
    </div>

    <div class="form-row">
        <label>Cursus de Formation</label>
        <select id="formation">
            <option value="ATP Intégré">ATP Intégré (Ab-Initio)</option>
            <option value="ATP Modulaire">ATP Modulaire</option>
            <option value="Formation PPL">Formation PPL (Private Pilot)</option>
            <option value="Qualification IFR">Qualification IFR / ME</option>
            <option value="CPL">CPL (Commercial Pilot)</option>
            <option value="Vol d'Initiation">Vol d'Initiation / Découverte</option>
        </select>
    </div>

    <div class="form-row">
        <label>Niveau de Satisfaction</label>
        <select id="note">
            <option value="5">Excellent ⭐⭐⭐⭐⭐</option>
            <option value="4">Très Bien ⭐⭐⭐⭐</option>
            <option value="3">Satisfaisant ⭐⭐⭐</option>
            <option value="2">Passable ⭐⭐</option>
            <option value="1">Insatisfaisant ⭐</option>
        </select>
    </div>

    <button class="btn-generate" onclick="generateReview()">Générer l'Expérience Client</button>
</div>

<div id="google-preview">
    <div class="google-user">
        <div class="avatar" id="avatar">J</div>
        <div>
            <div style="font-weight: bold;" id="prev-nom">Nom</div>
            <div style="font-size: 0.8rem; color: #70757a;">Avis Google • Local Guide</div>
        </div>
    </div>
    <div class="stars" id="prev-stars"></div>
    <div class="review-content" id="prev-text"></div>
    
    <div style="margin-top: 20px; display: flex; gap: 10px;">
        <button onclick="copyReview()" style="flex:1; padding: 10px; cursor: pointer; background: #eee; border:none;">Copier</button>
        <button onclick="window.open('https://www.google.com/search?q=cannes+aviation+avis', '_blank')" style="flex:1; padding: 10px; cursor: pointer; background: #4285F4; border:none; color: white;">Publier</button>
    </div>
</div>

<div class="links-bar">
    <a href="https://www.instagram.com/cannesaviation_academy/" target="_blank" class="link-item">📷 Instagram</a>
    <a href="https://www.cannes-aviation.com" target="_blank" class="link-item">✈️ Site Officiel</a>
</div>

<script>
    const database = {
        5: {
            intros: ["Formation d'excellence chez Cannes Aviation !", "Une académie d'exception pour futurs pilotes.", "Le meilleur choix pour mon ATP Intégré.", "Expérience de vol parfaite au-dessus de la Côte d'Azur."],
            corps: ["La flotte Diamond est moderne et l'instruction d'un niveau professionnel rare.", "Un suivi pédagogique rigoureux et des infrastructures de haute qualité.", "Les instructeurs partagent une passion et une expertise qui font toute la différence."],
            concl: ["Je recommande vivement à tous ceux qui visent une carrière en ligne.", "Une étape majeure réussie grâce à eux. Merci !", "Foncez sans hésiter pour votre formation."]
        },
        4: {
            intros: ["Très satisfait de mon cursus.", "Bonne école de pilotage, sérieuse et pro.", "Une formation de qualité."],
            corps: ["Le cadre de travail est idéal et les avions sont bien entretenus.", "Bonne préparation pour les examens théoriques et pratiques.", "Équipe réactive et à l'écoute de mes besoins."],
            concl: ["Une école que je recommande.", "Bilan très positif pour ma licence.", "À bientôt pour le prochain module !"]
        },
        3: {
            intros: ["Expérience correcte globalement.", "Formation sérieuse."],
            corps: ["Les cours sont complets, même si le planning est parfois dense.", "Les avions sont de bonne qualité malgré une forte demande."],
            concl: ["Satisfaisant dans l'ensemble.", "Bonne continuation à l'équipe."]
        },
        2: {
            intros: ["Expérience mitigée.", "Quelques points à revoir."],
            corps: ["Difficultés de planning rencontrées pendant ma formation.", "Le rapport qualité/prix pourrait être amélioré."],
            concl: ["Déçu par certains aspects.", "Dommage pour l'organisation."]
        },
        1: {
            intros: ["Je ne recommande pas.", "Mauvaise expérience."],
            corps: ["Problèmes récurrents de disponibilité et de communication.", "Formation qui n'a pas répondu à mes attentes."],
            concl: ["Je chercherai une autre école pour la suite.", "Très déçu."]
        }
    };

    function generateReview() {
        const nom = document.getElementById('nom').value || "Visiteur";
        const formation = document.getElementById('formation').value;
        const note = document.getElementById('note').value;
        
        const set = database[note];
        const r = (arr) => arr[Math.floor(Math.random() * arr.length)];
        
        const texte = `${r(set.intros)} ${r(set.corps)} Mon passage en ${formation} a été une étape clé. ${r(set.concl)}`;

        document.getElementById('avatar').innerText = nom.charAt(0).toUpperCase();
        document.getElementById('prev-nom').innerText = nom;
        document.getElementById('prev-stars').innerText = "★".repeat(note) + "☆".repeat(5-note);
        document.getElementById('prev-text').innerText = texte;
        
        document.getElementById('google-preview').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function copyReview() {
        const text = document.getElementById('prev-text').innerText;
        navigator.clipboard.writeText(text);
        alert("Avis copié avec succès !");
    }
</script>

</body>
</html>
