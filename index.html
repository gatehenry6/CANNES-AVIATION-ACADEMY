<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANNES AVIATION | Review Hub</title>
    <style>
        :root {
            --navy: #020617;
            --navy-luxe: #0f172a;
            --gold: #c5a059;
            --gold-bright: #fcd34d;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--navy);
            background-image: radial-gradient(at top right, #1e293b, #020617);
            color: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container { width: 100%; max-width: 450px; }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 1.8rem; letter-spacing: 5px; text-transform: uppercase; color: var(--gold); font-weight: 700; }
        .header p { font-size: 0.7rem; letter-spacing: 3px; color: #94a3b8; margin-top: 5px; }

        .card {
            background: var(--navy-luxe);
            padding: 35px;
            border-radius: 24px;
            border: 1px solid rgba(197, 160, 89, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .group { margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; font-weight: 800; color: var(--gold); text-transform: uppercase; margin-bottom: 8px; }

        input, select {
            width: 100%;
            padding: 14px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .btn-main {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--gold), #8a6d3b);
            color: var(--navy);
            border: none;
            border-radius: 12px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        /* --- GOOGLE PREVIEW --- */
        #result-box {
            display: none;
            margin-top: 30px;
            background: white;
            border-radius: 16px;
            padding: 25px;
            color: #202124;
            animation: fadeIn 0.5s ease;
        }

        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #1a73e8; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-bottom: 10px; }
        .stars { color: #fbbc05; font-size: 1.3rem; margin-bottom: 10px; }
        .review-content { font-size: 0.95rem; line-height: 1.5; color: #3c4043; font-style: italic; margin-bottom: 20px; }

        .btn-google {
            display: block;
            width: 100%;
            padding: 14px;
            background: #1a73e8;
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .copy-hint { font-size: 0.7rem; color: #70757a; text-align: center; margin-top: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>CANNES AVIATION</h1>
        <p>ACADEMY REVIEW HUB</p>
    </div>

    <div class="card">
        <div class="group">
            <label>Nom du Pilote</label>
            <input type="text" id="nom" placeholder="Ex: Jean Martin">
        </div>

        <div class="group">
            <label>Formation</label>
            <select id="formation">
                <option value="ATP Intégré">ATP Intégré</option>
                <option value="ATP Modulaire">ATP Modulaire</option>
                <option value="PPL">PPL</option>
                <option value="CPL/IR/ME">CPL / IR / ME</option>
                <option value="ATPL Théorique">ATPL Théorique</option>
            </select>
        </div>

        <div class="group">
            <label>Note</label>
            <select id="note">
                <option value="5">Excellent ⭐⭐⭐⭐⭐</option>
                <option value="4">Très Bien ⭐⭐⭐⭐</option>
                <option value="3">Correct ⭐⭐⭐</option>
            </select>
        </div>

        <button class="btn-main" onclick="process()">Générer & Publier</button>

        <div id="result-box">
            <div class="avatar" id="avatarLetter">?</div>
            <div class="stars" id="resStars">★★★★★</div>
            <div class="review-content" id="resText">...</div>
            
            <a href="#" class="btn-google" id="publishBtn" onclick="copyAndGo(event)">
                Copier & Publier sur Google
            </a>
            <p class="copy-hint">Le texte sera copié automatiquement avant redirection.</p>
        </div>
    </div>
</div>

<script>
    const reviews = {
        5: ["Une formation d'excellence ! Les instructeurs de Cannes Aviation sont d'un professionnalisme rare. La flotte Diamond est impeccable.", "Meilleure école de pilotage. Un cadre de vol magnifique et un suivi pédagogique de haute qualité.", "Expérience inoubliable pour mon ATP. Je recommande vivement cette académie pour son sérieux."],
        4: ["Très bonne école. Formation rigoureuse et avions très bien entretenus. Très satisfait.", "Cursus solide et instructeurs pédagogues. Une excellente étape pour ma carrière.", "Équipe à l'écoute et cadre de travail idéal. Je recommande."],
        3: ["Formation correcte. Le cadre est superbe même si le planning est parfois dense.", "Satisfait globalement du cursus et de la qualité des avions Diamond."]
    };

    function process() {
        const nom = document.getElementById('nom').value;
        const formation = document.getElementById('formation').value;
        const note = document.getElementById('note').value;

        if(!nom) { alert("Saisissez votre nom."); return; }

        const pool = reviews[note];
        const randomText = pool[Math.floor(Math.random() * pool.length)];
        const textFinal = `${randomText} (Formation ${formation} à Cannes Aviation)`;

        document.getElementById('avatarLetter').innerText = nom.charAt(0).toUpperCase();
        document.getElementById('resStars').innerText = "★".repeat(note) + "☆".repeat(5-note);
        document.getElementById('resText').innerText = textFinal;
        
        document.getElementById('result-box').style.display = 'block';
    }

    function copyAndGo(e) {
        e.preventDefault();
        const text = document.getElementById('resText').innerText;
        
        // Copie automatique
        navigator.clipboard.writeText(text).then(() => {
            alert("Avis copié ! Collez-le maintenant sur la page Google qui va s'ouvrir.");
            // LIEN DIRECT VERS LA RÉDACTION D'AVIS (Cannes Aviation Academy)
            const googleReviewLink = "https://search.google.com/local/writereview?placeid=ChIJid05G5_FzRIRpNoH9v3D7H0";
            window.open(googleReviewLink, '_blank');
        });
    }
</script>

</body>
</html>
