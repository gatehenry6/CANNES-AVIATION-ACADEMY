<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AvisPro - Générateur Intelligent</title>
    
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --card: #1e293b;
                --text: #f1f5f9;
                --border: #334155;
            }
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
        }

        .app-wrapper {
            width: 100%;
            max-width: 500px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 2rem;
            border-radius: 24px;
            shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 1.8rem; margin: 0; background: linear-gradient(to right, #8b5cf6, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.8; }

        input, select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 2px solid var(--border);
            background: transparent;
            color: var(--text);
            font-size: 1rem;
        }

        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1); }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 1.5rem; }

        button {
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-main { background: var(--primary); color: white; grid-column: span 2; }
        .btn-main:hover { background: var(--primary-dark); transform: scale(1.02); }

        .btn-secondary { background: var(--border); color: var(--text); font-size: 0.9rem; }

        #result-area {
            margin-top: 2rem;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .output-box {
            background: rgba(139, 92, 246, 0.05);
            border: 1px dashed var(--primary);
            padding: 20px;
            border-radius: 16px;
            line-height: 1.6;
            position: relative;
        }

        .history {
            margin-top: 2rem;
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="card">
        <div class="header">
            <h1>AvisPro AI</h1>
            <p style="opacity: 0.6; font-size: 0.9rem;">Générateur de témoignages haute conversion</p>
        </div>

        <div class="form-group">
            <label>👤 Nom du client</label>
            <input type="text" id="nom" placeholder="Jean Valjean" oninput="checkForm()">
        </div>

        <div class="form-group">
            <label>🛠️ Service / Produit</label>
            <input type="text" id="service" placeholder="Rénovation toiture" oninput="checkForm()">
        </div>

        <div class="form-group">
            <label>📍 Ville</label>
            <input type="text" id="ville" placeholder="Marseille" oninput="checkForm()">
        </div>

        <div class="form-group">
            <label>⭐ Note</label>
            <select id="note">
                <option value="5">Excellent (5/5)</option>
                <option value="4">Très bien (4/5)</option>
                <option value="3">Correct (3/5)</option>
            </select>
        </div>

        <button class="btn-main" id="gen-btn" onclick="processAvis()">
            ✨ Générer l'avis parfait
        </button>

        <div id="result-area">
            <div class="output-box" id="output-text"></div>
            <div class="btn-group">
                <button class="btn-secondary" onclick="copyText()">📋 Copier</button>
                <button class="btn-secondary" onclick="shareWA()">💬 WhatsApp</button>
            </div>
        </div>

        <div class="history" id="history-section" style="display:none;">
            <label>Derniers avis générés</label>
            <div id="history-list"></div>
        </div>
    </div>
</div>

<script>
    const library = {
        intros: ["Top !", "Incroyable service.", "Je suis bluffé.", "Une pépite !", "Enfin des pros."],
        details: [
            "L'attention portée aux détails est folle.",
            "Ils ont compris mon besoin immédiatement.",
            "Rapide, propre et efficace. Que demander de plus ?",
            "Le rapport qualité/prix est imbattable dans la région.",
            "On sent l'expérience et la passion du métier."
        ],
        concl: ["Allez-y les yeux fermés.", "Je recommande à 200%.", "Un grand merci à toute l'équipe !", "Propriétaire super sympa en plus.", "À très bientôt pour la suite."]
    };

    function checkForm() {
        const fields = ['nom', 'service', 'ville'];
        const isReady = fields.every(f => document.getElementById(f).value.length > 2);
        document.getElementById('gen-btn').style.opacity = isReady ? "1" : "0.5";
    }

    function processAvis() {
        const nom = document.getElementById('nom').value;
        const service = document.getElementById('service').value;
        const ville = document.getElementById('ville').value;
        const note = document.getElementById('note').value;

        if(!nom || !service || !ville) return alert("Remplissez tout pour un résultat magique !");

        const etoiles = "⭐".repeat(note);
        const texte = `${etoiles}\n"${library.intros[Math.floor(Math.random()*library.intros.length)]} ${library.details[Math.floor(Math.random()*library.details.length)]} Pour mon projet de ${service} à ${ville}, c'était parfait. ${library.concl[Math.floor(Math.random()*library.concl.length)]}"\n— ${nom}`;

        const out = document.getElementById('output-text');
        out.innerText = texte;
        document.getElementById('result-area').style.display = 'block';
        
        // Ajout à l'historique
        addHistory(nom, note);
    }

    function addHistory(nom, note) {
        const hist = document.getElementById('history-section');
        const list = document.getElementById('history-list');
        hist.style.display = 'block';
        const item = document.createElement('div');
        item.style.padding = "5px 0";
        item.innerHTML = `• <b>${nom}</b> (${note}/5) - ${new Date().toLocaleTimeString()}`;
        list.prepend(item);
    }

    function copyText() {
        navigator.clipboard.writeText(document.getElementById('output-text').innerText);
        alert("Copié dans le presse-papier !");
    }

    function shareWA() {
        const text = encodeURIComponent(document.getElementById('output-text').innerText);
        window.open(`https://wa.me/?text=${text}`, '_blank');
    }
</script>
</body>
</html>
