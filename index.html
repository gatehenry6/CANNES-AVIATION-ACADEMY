<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANNES AVIATION | Review Engine</title>
    
    <style>
        :root {
            --deep-space: #020617;
            --aviation-blue: #1e293b;
            --electric-gold: #fbbf24;
            --gold-glow: rgba(251, 191, 36, 0.3);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            margin: 0;
            background-color: var(--deep-space);
            background-image: 
                radial-gradient(at 0% 0%, rgba(30, 58, 138, 0.3) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(120, 53, 15, 0.2) 0px, transparent 50%);
            font-family: 'Inter', -apple-system, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px;
            position: relative;
        }

        /* --- LOGO & HEADER --- */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin: 0;
            background: linear-gradient(to right, #fff, var(--electric-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .header p {
            color: #94a3b8;
            font-size: 0.8rem;
            letter-spacing: 3px;
            margin-top: 8px;
        }

        /* --- CARD DESIGN --- */
        .main-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-box {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--electric-gold);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
        }

        input, select {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            padding: 14px 18px;
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        input:focus {
            border-color: var(--electric-gold);
            box-shadow: 0 0 15px var(--gold-glow);
        }

        /* --- BUTTONS --- */
        .btn-prime {
            width: 100%;
            background: white;
            color: black;
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-prime:hover {
            background: var(--electric-gold);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(251, 191, 36, 0.2);
        }

        /* --- GOOGLE INTERFACE --- */
        #review-result {
            display: none;
            margin-top: 30px;
            animation: slideIn 0.5s ease;
        }

        .google-card {
            background: white;
            color: #202124;
            padding: 24px;
            border-radius: 20px;
            position: relative;
        }

        .google-user {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        .google-avatar {
            width: 40px; height: 40px;
            background: #4285F4;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .stars-row { color: #fbbc05; font-size: 1.2rem; margin: 8px 0; }

        .text-body { line-height: 1.5; font-size: 0.95rem; }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-action {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #dadce0;
            background: #f8f9fa;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-publish {
            background: #1a73e8 !important;
            color: white !important;
            border: none !important;
        }

        /* --- FOOTER NAV --- */
        .footer-nav {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 30px;
        }

        .footer-nav a {
            color: #64748b;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .footer-nav a:hover { color: var(--electric-gold); }

        @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Cannes Aviation</h1>
        <p>Expert Pilot Academy</p>
    </div>

    <div class="main-card">
        <div class="input-box">
            <label>Pilote / Étudiant</label>
            <input type="text" id="userName" placeholder="Entrez votre nom">
        </div>

        <div class="input-box">
            <label>Formation Suivie</label>
            <select id="userFormation">
                <option value="ATP Intégré">ATP Intégré</option>
                <option value="ATP Modulaire">ATP Modulaire</option>
                <option value="PPL">PPL (Licence Privée)</option>
                <option value="CPL/IR/ME">CPL / IR / ME</option>
                <option value="ATPL Théorique">ATPL Théorique</option>
                <option value="Vol d'initiation">Vol d'initiation</option>
            </select>
        </div>

        <div class="input-box">
            <label>Évaluation</label>
            <select id="userNote">
                <option value="5">5 Étoiles - Excellence</option>
                <option value="4">4 Étoiles - Très bien</option>
                <option value="3">3 Étoiles - Moyen</option>
                <option value="2">2 Étoiles - Déçu</option>
                <option value="1">1 Étoile - Mauvais</option>
            </select>
        </div>

        <button class="btn-prime" onclick="processReview()">⚡ Générer l'avis</button>

        <div id="review-result">
            <div class="google-card">
                <div class="google-user">
                    <div class="google-avatar" id="avatarLetter">?</div>
                    <div>
                        <div style="font-weight: bold; font-size: 0.9rem;" id="displayName">Nom</div>
                        <div style="font-size: 0.7rem; color: #70757a;">Avis Google • Instantané</div>
                    </div>
                </div>
                <div class="stars-row" id="displayStars">★★★★★</div>
                <div class="text-body" id="displayText">...</div>
                
                <div class="action-grid">
                    <button class="btn-action" onclick="copyText()">📋 Copier</button>
                    <button class="btn-action btn-publish" onclick="publishGoogle()">🌍 Publier</button>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-nav">
        <a href="https://www.instagram.com/cannesaviation_academy/" target="_blank">Instagram</a>
        <a href="https://www.cannes-aviation.com" target="_blank">Site Web</a>
    </div>
</div>

<script>
    const database = {
        5: ["Excellence totale ! Mon ATP Intégré chez Cannes Aviation a été parfait. La flotte Diamond et les instructeurs sont au top niveau.", "Meilleure école de la Côte d'Azur. Un cadre de vol incroyable et un professionnalisme digne des grandes compagnies.", "Une formation de pilote rigoureuse et passionnante. Tout est fait pour réussir son avenir dans l'aérien."],
        4: ["Très bonne école. La formation est solide et les avions parfaitement entretenus. Je recommande vivement.", "Une équipe pédagogique à l'écoute et un cadre de travail idéal pour progresser sereinement.", "Formation sérieuse et efficace. Très satisfait de mon cursus ici."],
        3: ["Bilan correct. La formation est de qualité malgré un emploi du temps parfois chargé.", "Satisfait dans l'ensemble, même si l'organisation pourrait être optimisée."],
        2: ["Expérience mitigée. Quelques soucis de planning et de communication durant ma formation.", "Déçu par certains aspects administratifs malgré la qualité des instructeurs."],
        1: ["Je ne recommande pas. Trop de difficultés pour planifier mes vols et un manque de suivi.", "Expérience décevante au vu de l'investissement demandé. Manque de professionnalisme."]
    };

    function processReview() {
        const name = document.getElementById('userName').value;
        const formation = document.getElementById('userFormation').value;
        const note = document.getElementById('userNote').value;

        if(!name) { alert("Veuillez saisir votre nom."); return; }

        const textPool = database[note];
        const randomText = textPool[Math.floor(Math.random() * textPool.length)];
        const finalReview = `${randomText} (Cursus : ${formation})`;

        document.getElementById('displayName').innerText = name;
        document.getElementById('avatarLetter').innerText = name.charAt(0).toUpperCase();
        document.getElementById('displayStars').innerText = "★".repeat(note) + "☆".repeat(5-note);
        document.getElementById('displayText').innerText = finalReview;
        
        document.getElementById('review-result').style.display = 'block';
    }

    function copyText() {
        const content = document.getElementById('displayText').innerText;
        navigator.clipboard.writeText(content);
        alert("Avis copié ! Prêt à être collé.");
    }

    function publishGoogle() {
        // Lien direct vers la fenêtre de rédaction d'avis Google pour Cannes Aviation
        const googleReviewUrl = "https://search.google.com/local/writereview?placeid=ChIJid05G5_FzRIRpNoH9v3D7H0";
        window.open(googleReviewUrl, '_blank');
    }
</script>

</body>
</html>
