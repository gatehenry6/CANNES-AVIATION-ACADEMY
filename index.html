<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANNES AVIATION | Luxury Review Generator</title>
    
    <style>
        /* --- DESIGN LUXUEUX --- */
        :root {
            --navy-deep: #050a14;
            --navy-card: #0c1626;
            --gold-gradient: linear-gradient(135deg, #e6c280 0%, #b38b45 100%);
            --gold-solid: #c5a059;
            --white-pure: #ffffff;
            --text-gray: #a0aec0;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body {
            margin: 0;
            background-color: var(--navy-deep);
            background-image: radial-gradient(circle at top right, #101f33 0%, #050a14 100%);
            font-family: 'Times New Roman', serif; /* Typographie classique luxe */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            color: var(--white-pure);
        }

        /* --- HEADER --- */
        .brand-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .brand-header h1 {
            font-size: 2.8rem;
            letter-spacing: 10px;
            margin: 0;
            text-transform: uppercase;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 300;
        }

        .brand-header p {
            font-family: 'Arial', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: 10px;
            color: var(--gold-solid);
            opacity: 0.9;
        }

        /* --- CARTE FORMULAIRE --- */
        .glass-card {
            background: var(--navy-card);
            width: 100%;
            max-width: 600px;
            padding: 40px;
            border-radius: 2px;
            border: 1px solid rgba(197, 160, 89, 0.2);
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
        }

        .input-wrapper { margin-bottom: 25px; }

        label {
            display: block;
            font-family: 'Arial', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            color: var(--gold-solid);
        }

        input, select {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(197, 160, 89, 0.3);
            padding: 15px;
            color: white;
            font-size: 1rem;
            outline: none;
            font-family: 'Arial', sans-serif;
        }

        input:focus, select:focus {
            border-color: var(--gold-solid);
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-gold {
            width: 100%;
            background: var(--gold-gradient);
            color: var(--navy-deep);
            border: none;
            padding: 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            margin-top: 20px;
            font-family: 'Arial', sans-serif;
        }

        .btn-gold:hover {
            letter-spacing: 4px;
            filter: brightness(1.1);
        }

        /* --- GOOGLE PREVIEW --- */
        #google-preview {
            display: none;
            margin-top: 40px;
            background: white;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 8px;
            color: #3c4043;
            animation: fadeIn 0.8s ease;
        }

        .google-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .avatar {
            width: 45px; height: 45px;
            background: #1a73e8;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-family: 'Arial', sans-serif;
        }

        .stars { color: #fbbc05; font-size: 1.4rem; margin: 10px 0; }

        .review-body { font-family: 'Arial', sans-serif; line-height: 1.6; font-size: 1rem; color: #1f1f1f; }

        /* --- NAVIGATION / LIENS --- */
        .footer-nav {
            margin-top: 50px;
            display: flex;
            gap: 30px;
        }

        .nav-link {
            color: var(--gold-solid);
            text-decoration: none;
            font-size: 0.8rem;
            font-family: 'Arial', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
        }

        .nav-link:hover { opacity: 1; border-bottom: 1px solid var(--gold-solid); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="brand-header">
    <h1>CANNES AVIATION</h1>
    <p>Academy & Private Jet Charter</p>
</div>

<div class="glass-card">
    <div class="input-wrapper">
        <label>Identité du Candidat / Client</label>
        <input type="text" id="nom" placeholder="Ex: Alexandre de Beaumont">
    </div>

    <div class="input-wrapper">
        <label>Cursus ou Service</label>
        <select id="formation">
            <option value="ATP Intégré">ATP Intégré (Ab-Initio)</option>
            <option value="ATP Modulaire">ATP Modulaire</option>
            <option value="PPL">PPL - Private Pilot License</option>
            <option value="CPL">CPL - Commercial Pilot</option>
            <option value="IR/ME">Qualification IR / ME (Multi-Engine)</option>
            <option value="ATPL Théorique">ATPL Théorique</option>
            <option value="Vol Découverte">Vol Découverte / Initiation</option>
        </select>
    </div>

    <div class="input-wrapper">
        <label>Note Attribuée</label>
        <select id="note">
            <option value="5">Excellent ⭐⭐⭐⭐⭐</option>
            <option value="4">Très Bien ⭐⭐⭐⭐</option>
            <option value="3">Satisfaisant ⭐⭐⭐</option>
            <option value="2">Passable ⭐⭐</option>
            <option value="1">Insatisfaisant ⭐</option>
        </select>
    </div>

    <button class="btn-gold" onclick="genererAvisExpert()">Générer l'avis prestige</button>
</div>

<div id="google-preview">
    <div class="google-header">
        <div class="avatar" id="avatar-circle">?</div>
        <div>
            <div style="font-weight: bold; font-family: Arial;" id="google-name">Nom du Client</div>
            <div style="font-size: 0.75rem; color: #70757a; font-family: Arial;">Il y a un instant • Avis Google</div>
        </div>
    </div>
    <div class="stars" id="google-stars">★★★★★</div>
    <div class="review-body" id="google-text">Texte de l'avis...</div>
    
    <div style="margin-top: 25px; display: flex; gap: 10px;">
        <button onclick="copyToClipboard()" style="flex:1; padding: 12px; cursor: pointer; border: 1px solid #dadce0; background: #f8f9fa; border-radius: 4px;">Copier le texte</button>
        <button onclick="window.open('https://www.cannes-aviation.com', '_blank')" style="flex:1; padding: 12px; cursor: pointer; background: #1a73e8; border: none; color: white; border-radius: 4px;">Publier sur Maps</button>
    </div>
</div>

<div class="footer-nav">
    <a href="https://www.instagram.com/cannesaviation_academy/" target="_blank" class="nav-link">Instagram</a>
    <a href="https://www.cannes-aviation.com" target="_blank" class="nav-link">Site Officiel</a>
    <a href="mailto:contact@cannes-aviation.com" class="nav-link">Contact</a>
</div>

<script>
    const database = {
        5: {
            intro: ["Excellence absolue.", "La meilleure école de pilotage de France.", "Une formation d'élite.", "Une flotte Diamond impressionnante."],
            detail: ["L'instruction sur Diamond DA40/DA42 est un vrai plus.", "L'encadrement pédagogique est d'une rigueur exceptionnelle.", "Le cadre de l'aéroport de Cannes-Mandelieu est parfait pour l'apprentissage.", "On sent un professionnalisme digne des plus grandes compagnies aériennes."],
            concl: ["Mon ATP Intégré est une réussite totale grâce à vous.", "Je recommande vivement Cannes Aviation.", "Un grand merci à toute l'équipe pour cet accompagnement."]
        },
        4: {
            intro: ["Très bonne académie.", "Formation de haute qualité.", "Une expérience très positive."],
            detail: ["Les instructeurs sont pédagogues et très disponibles.", "Les infrastructures sont modernes et accueillantes.", "Bonne préparation aux examens pratiques et théoriques."],
            concl: ["Une école sérieuse que je conseille.", "Bilan très positif pour ma licence.", "Hâte de continuer l'aventure avec vous."]
        },
        3: {
            intro: ["Expérience satisfaisante.", "Formation correcte."],
            detail: ["Les cours sont complets malgré un planning parfois chargé.", "Les avions sont de qualité, bien que très sollicités."],
            concl: ["Bonne école dans l'ensemble.", "Merci pour l'accueil."]
        },
        2: {
            intro: ["Quelques déceptions.", "Peut mieux faire."],
            detail: ["Des difficultés d'organisation au niveau du planning.", "La communication pourrait être plus fluide."],
            concl: ["Expérience mitigée.", "Dommage car le cadre est superbe."]
        },
        1: {
            intro: ["Je ne recommande pas.", "Expérience décevante."],
            detail: ["Trop de problèmes de disponibilité pour voler.", "Le suivi administratif n'était pas à la hauteur de mes attentes."],
            concl: ["Je me dirigerai vers une autre école.", "Déçu par ce cursus."]
        }
    };

    function random(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function genererAvisExpert() {
        const nom = document.getElementById('nom').value || "Visiteur Elite";
        const formation = document.getElementById('formation').value;
        const note = parseInt(document.getElementById('note').value);
        
        const set = database[note];
        const avisFinal = `${random(set.intro)} ${random(set.detail)} Ma formation en ${formation} s'est déroulée dans des conditions haut de gamme. ${random(set.concl)}`;

        // Mise à jour de l'aperçu Google
        document.getElementById('google-name').innerText = nom;
        document.getElementById('avatar-circle').innerText = nom.charAt(0).toUpperCase();
        document.getElementById('google-stars').innerText = "★".repeat(note) + "☆".repeat(5-note);
        document.getElementById('google-text').innerText = avisFinal;

        // Affichage
        document.getElementById('google-preview').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function copyToClipboard() {
        const text = document.getElementById('google-text').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("Avis copié ! Vous pouvez maintenant le coller sur Google.");
        });
    }
</script>

</body>
</html>
